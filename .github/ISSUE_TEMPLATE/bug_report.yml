name: Bug Report
description: Report a bug or issue with the theme or installer
title: "fix: <summary>"
labels: ["type: bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug, and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `./install.sh ...`
        2. Open KDE Settings
        3. ...
    validations:
      required: true
  - type: dropdown
    id: plasma_version
    attributes:
      label: Plasma Version
      options:
        - Plasma 6.1
        - Plasma 6.0
        - Plasma 5.27 (LTS)
        - Other (please specify above)
    validations:
      required: true
  - type: dropdown
    id: distro
    attributes:
      label: Linux Distribution
      options:
        - Arch Linux
        - Fedora
        - openSUSE (Tumbleweed/Leap)
        - KDE neon
        - Debian
        - Ubuntu / Kubuntu
        - Manjaro
        - Gentoo
        - Void Linux
        - NixOS
        - Other (please specify above)
    validations:
      required: true
  - type: dropdown
    id: flavour
    attributes:
      label: Theme Flavour
      options:
        - Mocha
        - Macchiato
        - Frappe
        - Latte
        - Multiple / All
        - Not sure
    validations:
      required: false
  - type: dropdown
    id: accent
    attributes:
      label: Theme Accent
      options:
        - Rosewater
        - Flamingo
        - Pink
        - Mauve
        - Red
        - Maroon
        - Peach
        - Yellow
        - Green
        - Teal
        - Sky
        - Sapphire
        - Blue
        - Lavender
        - Multiple / All
        - Not sure
    validations:
      required: false
  - type: dropdown
    id: decoration
    attributes:
      label: Window Decoration Style
      options:
        - Modern (Mixed)
        - Classic (MacOS like)
        - None / Other
        - Not sure
    validations:
      required: false
  - type: textarea
    id: system_details
    attributes:
      label: Logs / Screenshots
      description: Installer output, kwin logs, or drag & drop screenshots showing the issue.
    validations:
      required: false
