name: "Lint PR Title"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  statuses: write

jobs:
  main:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # list both cases so the gate stays case-insensitive (e.g.
          # dependabot's "Chore"); the action matches types literally
          types: |
            feat
            Feat
            fix
            Fix
            docs
            Docs
            style
            Style
            refactor
            Refactor
            perf
            Perf
            test
            Test
            build
            Build
            ci
            Ci
            chore
            Chore
            revert
            Revert
          scopes: |
            assets
            installer
            resources
            ci
            tests
            docs
            patches
            deps
          requireScope: false
